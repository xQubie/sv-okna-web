<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --glass: rgba(45, 40, 35, 0.85);
            --stroke: rgba(255, 255, 255, 0.1);
            --accent: #bb86fc; /* Цвет текста кнопок в Android */
        }

        body {
            background: #000 url('https://sv-okna.ru/images/background_placeholder.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0; padding: 16px;
            padding-bottom: 100px;
        }

        /* Эффект блюра как в приложении */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            z-index: -1;
        }

        /* Стили разделов (Аккордеон) */
        .category-container {
            background: var(--glass);
            border: 1px solid var(--stroke);
            border-radius: 28px;
            margin-bottom: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .category-header {
            padding: 18px 20px;
            display: flex; align-items: center; justify-content: space-between;
            cursor: pointer;
        }

        .category-title {
            display: flex; align-items: center; gap: 12px;
            font-size: 16px; font-weight: 500;
        }

        .info-icon {
            width: 22px; height: 22px; background: rgba(255,255,255,0.1);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 14px; font-style: italic; font-weight: bold;
        }

        .arrow {
            width: 12px; height: 12px; border-right: 2px solid #fff; border-bottom: 2px solid #fff;
            transform: rotate(45deg); transition: 0.3s; margin-right: 5px;
        }

        .category-container.active .arrow { transform: rotate(-135deg); }

        .category-content {
            display: none; padding: 0 10px 15px 10px;
            border-top: 1px solid var(--stroke);
        }

        .category-container.active .category-content { display: block; }

        /* Позиции внутри */
        .pos-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 10px; border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .pos-name { flex: 1; font-size: 15px; opacity: 0.9; }
        .pos-price { font-weight: 600; margin: 0 10px; white-space: nowrap; }
        
        .pos-links { display: flex; gap: 8px; align-items: center; }
        .link-icon { width: 20px; height: 20px; border-radius: 4px; object-fit: cover; }
        .check-icon { color: #4CAF50; font-weight: bold; }

        /* Всплывающее окно (Диалог) */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center;
        }

        .modal-content {
            background: #2d2d2d; width: 85%; border-radius: 12px; padding: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .modal-title { font-size: 18px; font-weight: 600; margin-bottom: 15px; }
        .modal-body { font-size: 15px; line-height: 1.5; opacity: 0.9; white-space: pre-wrap; }
        .modal-btn { 
            color: var(--accent); font-weight: bold; text-align: right; 
            margin-top: 20px; cursor: pointer; text-transform: uppercase;
        }

        /* Кнопки связи снизу */
        .bottom-nav {
            position: fixed; bottom: 20px; left: 16px; right: 16px;
            display: flex; gap: 10px;
        }
        .nav-btn {
            flex: 1; padding: 15px; border-radius: 30px; text-align: center;
            text-decoration: none; color: #fff; font-weight: 600;
            background: var(--glass); border: 1px solid var(--stroke);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }
    </style>
</head>
