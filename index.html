<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --glass: rgba(30, 30, 30, 0.75);
            --stroke: rgba(255, 255, 255, 0.15);
            --accent: #00afff;
            --green: #4CAF50;
            --red: #FF5252;
        }

        body {
            background: #000 url('bg.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            margin: 0; padding: 16px;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .category-container {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--stroke);
            border-radius: 24px;
            margin-bottom: 12px;
            overflow: hidden;
        }

        .category-header {
            padding: 18px 20px;
            display: flex; align-items: center; justify-content: space-between;
            cursor: pointer;
        }

        .category-title {
            display: flex; align-items: center; gap: 14px;
            font-size: 17px; font-weight: 500;
        }

        .info-icon {
            width: 26px; height: 26px; background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 13px; font-weight: bold; color: var(--accent);
        }

        .arrow {
            width: 8px; height: 8px; border-right: 2px solid rgba(255,255,255,0.5); 
            border-bottom: 2px solid rgba(255,255,255,0.5);
            transform: rotate(45deg); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .no-arrow .arrow { visibility: hidden; }
        .category-container.active .arrow { transform: rotate(-135deg); }

        .category-content {
            display: none; padding: 0 12px 16px 12px;
            border-top: 1px solid var(--stroke);
        }

        .category-container.active .category-content { display: block; }

        .pos-item {
            display: grid;
            grid-template-columns: 1fr 90px 40px 60px;
            align-items: center;
            padding: 14px 8px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        .pos-item:last-child { border-bottom: none; }
        .pos-name { font-size: 15px; opacity: 0.95; }
        .pos-price { font-weight: 600; text-align: right; font-size: 14px; }
        
        .status-icon { text-align: center; font-size: 18px; font-weight: bold; }
        .in-stock { color: var(--green) !important; }
        .out-of-stock { color: var(--red) !important; }

        .pos-links { display: flex; gap: 10px; justify-content: flex-end; }
        .link-icon { width: 22px; height: 22px; border-radius: 5px; }

        /* ВСПЛЫВАЮЩЕЕ ОКНО */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.65); z-index: 1000; align-items: center; justify-content: center;
            backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
        }

        .modal-content {
            background: rgba(45, 45, 45, 0.9);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            width: 80%; max-width: 350px; border-radius: 28px; padding: 24px;
            border: 1px solid rgba(255,255,255,0.18);
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
            transform: scale(0.85); opacity: 0;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .modal.show .modal-content { transform: scale(1); opacity: 1; }

        .modal-title { font-size: 20px; font-weight: 700; margin-bottom: 14px; color: var(--accent); text-align: left; }
        
        .modal-body { 
            font-size: 15.5px; line-height: 1.5; opacity: 0.9; margin-bottom: 24px; 
            text-align: left; /* Выравнивание по левому краю */
            white-space: pre-wrap; 
        }
        
        .modal-footer { text-align: right; } /* Кнопка справа */

        .modal-btn { 
            background: var(--accent);
            color: #fff; font-weight: 700; padding: 10px 32px;
            border-radius: 18px; display: inline-block; cursor: pointer;
            box-shadow: 0 4px 12px rgba(0, 175, 255, 0.25);
            transition: transform 0.15s;
        }
        .modal-btn:active { transform: scale(0.92); }
    </style>
</head>
<body>

    <div id="app-content"></div>

    <div id="infoModal" class="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div id="modalTitle" class="modal-title"></div>
            <div id="modalBody" class="modal-body"></div>
            <div class="modal-footer">
                <div class="modal-btn" onclick="closeModal()">ОК</div>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();
        tg.setHeaderColor('#000000');

        const binUrl = "https://api.jsonbin.io/v3/b/69a9530ed0ea881f40f12d78";
        const masterKey = "$2a$10$5YbFE8JVfomxRwl2x1XOzOyJXmUkVRi.ssHGBEvHkVGlSPyyBQcpC";

        const categories = [
            "Лиственница 78 [-5%]", "Липа 60 [-15%]", "ОСВ Для Дачи [-10%]", 
            "Дуб 78", "Аксессуары", "Двери ПВХ", "Условия доставки"
        ];

        async function loadData() {
            try {
                const response = await fetch(binUrl, { headers: { "X-Master-Key": masterKey, "X-Bin-Meta": "false" } });
                const data = await response.json();
                render(data);
            } catch (e) { console.error(e); }
        }

        function render(data) {
            const container = document.getElementById('app-content');
            container.innerHTML = '';
            const infos = data._category_infos || {};

            categories.forEach(cat => {
                const items = data[cat] || [];
                const isStatic = cat === "Условия доставки";
                const div = document.createElement('div');
                div.className = `category-container ${isStatic ? 'no-arrow' : ''}`;
                
                div.innerHTML = `
                    <div class="category-header" onclick="${isStatic ? '' : 'toggleCat(this)'}">
                        <div class="category-title">
                            <div class="info-icon" onclick="showInfo(event, '${cat}', \`${infos[cat] || 'Нет данных'}\`)">i</div>
                            ${cat}
                        </div>
                        <div class="arrow"></div>
                    </div>
                    ${!isStatic ? `
                    <div class="category-content">
                        ${items.map(pos => `
                            <div class="pos-item">
                                <span class="pos-name">${pos.name}</span>
                                <span class="pos-price">${pos.price} ₽</span>
                                <span class="status-icon ${pos.quantity > 0 ? 'in-stock' : 'out-of-stock'}">
                                    ${pos.quantity > 0 ? '&#10004;&#xFE0E;' : '&#10006;&#xFE0E;'}
                                </span>
                                <div class="pos-links">
                                    ${pos.avito ? `<a href="${pos.avito}"><img src="avito.png" class="link-icon"></a>` : ''}
                                    ${pos.ozon ? `<a href="${pos.ozon}"><img src="ozon.png" class="link-icon"></a>` : ''}
                                </div>
                            </div>
                        `).join('')}
                    </div>` : ''}
                `;
                container.appendChild(div);
            });
        }

        function toggleCat(el) {
            el.parentElement.classList.toggle('active');
            if (tg.HapticFeedback) tg.HapticFeedback.selectionChanged();
        }

        function showInfo(event, title, text) {
            event.stopPropagation();
            const modal = document.getElementById('infoModal');
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalBody').innerText = text;
            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('show'), 10);
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        }

        function closeModal() {
            const modal = document.getElementById('infoModal');
            modal.classList.remove('show');
            setTimeout(() => modal.style.display = 'none', 250);
        }

        loadData();
    </script>
</body>
</html>
