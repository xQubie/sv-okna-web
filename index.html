<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --glass: rgba(45, 40, 35, 0.85);
            --stroke: rgba(255, 255, 255, 0.12);
            --accent: #bb86fc;
        }

        body {
            background: #000 url('https://sv-okna.ru/images/background_placeholder.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0; padding: 16px;
            padding-bottom: env(safe-area-inset-bottom);
        }

        body::before {
            content: ""; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.45); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            z-index: -1;
        }

        .category-container {
            background: var(--glass);
            border: 1px solid var(--stroke);
            border-radius: 28px;
            margin-bottom: 12px;
            overflow: hidden;
        }

        .category-header {
            padding: 18px 20px;
            display: flex; align-items: center; justify-content: space-between;
            cursor: pointer;
        }

        .category-title {
            display: flex; align-items: center; gap: 14px;
            font-size: 17px; font-weight: 500;
        }

        .info-icon {
            width: 24px; height: 24px; background: rgba(255,255,255,0.12);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 14px; font-style: italic; font-weight: bold;
        }

        .arrow {
            width: 10px; height: 10px; border-right: 2px solid rgba(255,255,255,0.7); 
            border-bottom: 2px solid rgba(255,255,255,0.7);
            transform: rotate(45deg); transition: 0.3s; margin-right: 4px;
        }

        /* Если категория не раскрывается (Условия доставки) */
        .no-arrow .arrow { display: none; }

        .category-container.active .arrow { transform: rotate(-135deg); }

        .category-content {
            display: none; padding: 0 12px 16px 12px;
            border-top: 1px solid var(--stroke);
            background: rgba(0,0,0,0.1);
        }

        .category-container.active .category-content { display: block; }

        /* Позиции: Сетка как на скриншоте */
        .pos-item {
            display: grid;
            grid-template-columns: 1fr 100px 30px 60px; /* Фиксированные колонки для выравнивания */
            align-items: center;
            padding: 14px 8px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        .pos-item:last-child { border-bottom: none; }

        .pos-name { font-size: 15px; opacity: 0.9; }
        .pos-price { font-weight: 600; text-align: right; white-space: nowrap; }
        
        .status-icon { text-align: center; font-size: 18px; }
        .in-stock { color: #4CAF50; }
        .out-of-stock { color: #F44336; }

        .pos-links { display: flex; gap: 8px; justify-content: flex-end; min-width: 60px; }
        .link-icon { width: 22px; height: 22px; border-radius: 4px; }

        /* Модалка */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.75); z-index: 1000; align-items: center; justify-content: center;
        }

        .modal-content {
            background: #2c2c2e; width: 82%; border-radius: 14px; padding: 24px;
        }

        .modal-title { font-size: 19px; font-weight: 600; margin-bottom: 12px; }
        .modal-body { font-size: 15.5px; line-height: 1.5; opacity: 0.85; white-space: pre-wrap; }
        .modal-btn { color: var(--accent); font-weight: bold; text-align: right; margin-top: 24px; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="app-content"></div>

    <div id="infoModal" class="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div id="modalTitle" class="modal-title"></div>
            <div id="modalBody" class="modal-body"></div>
            <div class="modal-btn" onclick="closeModal()">OK</div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        const binUrl = "https://api.jsonbin.io/v3/b/69a9530ed0ea881f40f12d78";
        const masterKey = "$2a$10$5YbFE8JVfomxRwl2x1XOzOyJXmUkVRi.ssHGBEvHkVGlSPyyBQcpC";

        const categories = ["Лиственница 78 [-5%]", "Липа 60 [-15%]", "ОСВ Для Дачи [-10%]", "Дуб 78", "Аксессуары", "Двери ПВХ", "Условия доставки"];

        async function loadData() {
            try {
                const response = await fetch(binUrl, { headers: { "X-Master-Key": masterKey, "X-Bin-Meta": "false" } });
                const data = await response.json();
                render(data);
            } catch (e) { document.getElementById('app-content').innerText = "Ошибка загрузки"; }
        }

        function render(data) {
            const container = document.getElementById('app-content');
            container.innerHTML = '';
            const infos = data._category_infos || {};

            categories.forEach(cat => {
                const items = data[cat] || [];
                const isStatic = cat === "Условия доставки";
                const div = document.createElement('div');
                div.className = `category-container ${isStatic ? 'no-arrow' : ''}`;
                
                div.innerHTML = `
                    <div class="category-header" onclick="${isStatic ? '' : 'toggleCat(this)'}">
                        <div class="category-title">
                            <div class="info-icon" onclick="showInfo(event, '${cat}', \`${infos[cat] || '...'}\`)">i</div>
                            ${cat}
                        </div>
                        <div class="arrow"></div>
                    </div>
                    ${!isStatic ? `
                    <div class="category-content">
                        ${items.map(pos => `
                            <div class="pos-item">
                                <span class="pos-name">${pos.name}</span>
                                <span class="pos-price">${pos.price} ₽</span>
                                <span class="status-icon ${pos.quantity > 0 ? 'in-stock' : 'out-of-stock'}">
                                    ${pos.quantity > 0 ? '✔' : '✖'}
                                </span>
                                <div class="pos-links">
                                    ${pos.avito ? `<a href="${pos.avito}"><img src="https://static.avito.ru/s/common/components/monorepo/visual_rubricator/models/desktop/avito_logo.png" class="link-icon"></a>` : ''}
                                    ${pos.ozon ? `<a href="${pos.ozon}"><img src="https://cdn1.ozone.ru/s3/cms/92/t96/favicon.ico" class="link-icon"></a>` : ''}
                                </div>
                            </div>
                        `).join('')}
                    </div>` : ''}
                `;
                container.appendChild(div);
            });
        }

        function toggleCat(el) {
            el.parentElement.classList.toggle('active');
            if (tg.HapticFeedback) tg.HapticFeedback.selectionChanged();
        }

        function showInfo(event, title, text) {
            event.stopPropagation();
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalBody').innerText = text;
            document.getElementById('infoModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('infoModal').style.display = 'none';
        }

        loadData();
    </script>
</body>
</html>
